<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Webサイト公開チェックリスト</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
  <h1>Webサイト公開チェックリスト</h1>
  <p>公開前・公開後の確認事項を管理します</p>
</header>

<div class="summary">
  <div class="summary-card pre">
    <div class="rate" id="rate-pre">0%</div>
    <div class="label">公開前</div>
    <div class="progress-bar"><div class="progress-bar-fill" id="bar-pre" style="width:0%"></div></div>
  </div>
  <div class="summary-card post">
    <div class="rate" id="rate-post">0%</div>
    <div class="label">公開後</div>
    <div class="progress-bar"><div class="progress-bar-fill" id="bar-post" style="width:0%"></div></div>
  </div>
  <div class="summary-card total">
    <div class="rate" id="rate-total">0%</div>
    <div class="label">全体</div>
    <div class="progress-bar"><div class="progress-bar-fill" id="bar-total" style="width:0%"></div></div>
  </div>
</div>

<section class="section" id="section-pre">
  <div class="section-header">
    <h2><span class="badge pre">公開前</span>Pre-launch</h2>
    <span class="section-count" id="count-pre">0 / 0</span>
  </div>
  <ul class="checklist" id="list-pre"></ul>
</section>

<section class="section post" id="section-post">
  <div class="section-header">
    <h2><span class="badge post">公開後</span>Post-launch</h2>
    <span class="section-count" id="count-post">0 / 0</span>
  </div>
  <ul class="checklist" id="list-post"></ul>
</section>

<button class="reset-btn" id="reset-btn">チェックをすべてリセット</button>

<script src="js/main.js"></script>
</body>
</html>
