<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Webサイト公開チェックリスト</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f4f6f9;
      color: #1a1a2e;
      min-height: 100vh;
      padding: 32px 16px;
    }

    header {
      text-align: center;
      margin-bottom: 32px;
    }
    header h1 {
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 8px;
    }
    header p {
      color: #666;
      font-size: 0.9rem;
    }

    .summary {
      display: flex;
      gap: 16px;
      justify-content: center;
      margin-bottom: 32px;
      flex-wrap: wrap;
    }

    .summary-card {
      background: #fff;
      border-radius: 12px;
      padding: 20px 28px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,.08);
      min-width: 160px;
    }
    .summary-card .rate {
      font-size: 2rem;
      font-weight: 700;
      line-height: 1;
    }
    .summary-card .label {
      font-size: 0.78rem;
      color: #888;
      margin-top: 4px;
    }
    .summary-card.pre  .rate { color: #4f46e5; }
    .summary-card.post .rate { color: #0891b2; }
    .summary-card.total .rate { color: #059669; }

    .progress-bar {
      height: 6px;
      background: #e5e7eb;
      border-radius: 99px;
      margin-top: 8px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      border-radius: 99px;
      transition: width .4s ease;
    }
    .pre  .progress-bar-fill { background: #4f46e5; }
    .post .progress-bar-fill { background: #0891b2; }
    .total .progress-bar-fill { background: #059669; }

    .section {
      max-width: 680px;
      margin: 0 auto 28px;
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 2px 8px rgba(0,0,0,.08);
      overflow: hidden;
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 24px;
      border-bottom: 1px solid #f0f0f0;
    }
    .section-header h2 {
      font-size: 1rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .badge {
      font-size: 0.72rem;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 99px;
      color: #fff;
    }
    .badge.pre  { background: #4f46e5; }
    .badge.post { background: #0891b2; }

    .section-count {
      font-size: 0.82rem;
      color: #888;
    }

    .checklist {
      list-style: none;
    }
    .checklist li {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 14px 24px;
      border-bottom: 1px solid #f7f7f7;
      cursor: pointer;
      transition: background .15s;
    }
    .checklist li:last-child { border-bottom: none; }
    .checklist li:hover { background: #fafafa; }

    .checklist li input[type="checkbox"] {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
      margin-top: 2px;
      accent-color: #4f46e5;
      cursor: pointer;
    }
    .section.post .checklist li input[type="checkbox"] {
      accent-color: #0891b2;
    }

    .item-text {
      flex: 1;
    }
    .item-text .title {
      font-size: 0.92rem;
      font-weight: 500;
      line-height: 1.4;
    }
    .item-text .note {
      font-size: 0.78rem;
      color: #999;
      margin-top: 2px;
    }

    .checklist li.checked .item-text .title {
      text-decoration: line-through;
      color: #bbb;
    }
    .checklist li.checked .item-text .note {
      color: #ccc;
    }

    .reset-btn {
      display: block;
      margin: 0 auto 48px;
      padding: 10px 28px;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      background: transparent;
      color: #666;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all .2s;
    }
    .reset-btn:hover { border-color: #ef4444; color: #ef4444; }
  </style>
</head>
<body>

<header>
  <h1>Webサイト公開チェックリスト</h1>
  <p>公開前・公開後の確認事項を管理します</p>
</header>

<div class="summary">
  <div class="summary-card pre">
    <div class="rate" id="rate-pre">0%</div>
    <div class="label">公開前</div>
    <div class="progress-bar"><div class="progress-bar-fill" id="bar-pre" style="width:0%"></div></div>
  </div>
  <div class="summary-card post">
    <div class="rate" id="rate-post">0%</div>
    <div class="label">公開後</div>
    <div class="progress-bar"><div class="progress-bar-fill" id="bar-post" style="width:0%"></div></div>
  </div>
  <div class="summary-card total">
    <div class="rate" id="rate-total">0%</div>
    <div class="label">全体</div>
    <div class="progress-bar"><div class="progress-bar-fill" id="bar-total" style="width:0%"></div></div>
  </div>
</div>

<section class="section" id="section-pre">
  <div class="section-header">
    <h2><span class="badge pre">公開前</span>Pre-launch</h2>
    <span class="section-count" id="count-pre">0 / 0</span>
  </div>
  <ul class="checklist" id="list-pre"></ul>
</section>

<section class="section post" id="section-post">
  <div class="section-header">
    <h2><span class="badge post">公開後</span>Post-launch</h2>
    <span class="section-count" id="count-post">0 / 0</span>
  </div>
  <ul class="checklist" id="list-post"></ul>
</section>

<button class="reset-btn" id="reset-btn">チェックをすべてリセット</button>

<script>
  const ITEMS = {
    pre: [
      { id: "pre-1",  title: "ページタイトルの設定",          note: "各ページに適切な <title> タグがあるか" },
      { id: "pre-2",  title: "メタディスクリプションの設定",   note: "検索結果に表示される説明文" },
      { id: "pre-3",  title: "OGP設定",                        note: "SNSシェア時の画像・タイトル・説明" },
      { id: "pre-4",  title: "favicon の設定",                 note: "ブラウザタブに表示されるアイコン" },
      { id: "pre-5",  title: "レスポンシブデザインの確認",     note: "スマートフォン・タブレットでの表示" },
      { id: "pre-6",  title: "ブラウザ互換性の確認",           note: "Chrome / Safari / Firefox / Edge" },
      { id: "pre-7",  title: "リンク切れチェック",             note: "内部リンク・外部リンクすべて" },
      { id: "pre-8",  title: "画像の alt 属性設定",            note: "アクセシビリティ・SEO対策" },
      { id: "pre-9",  title: "フォームの動作確認",             note: "送信・バリデーション・サンクスページ" },
      { id: "pre-10", title: "SSL証明書の設定",                note: "https:// でアクセスできるか" },
      { id: "pre-11", title: "404ページの設定",                note: "存在しないURLへのアクセス時の表示" },
      { id: "pre-12", title: "アクセス解析の設置",             note: "Google Analytics / Search Console など" },
    ],
    post: [
      { id: "post-1", title: "本番URLで表示確認",              note: "すべてのページが正常に表示されるか" },
      { id: "post-2", title: "フォームの本番動作確認",         note: "実際にメールが届くか確認" },
      { id: "post-3", title: "SNSシェアの確認",               note: "OGP画像・テキストが正しく表示されるか" },
      { id: "post-4", title: "Google Search Console への登録", note: "サイトマップの送信も行う" },
      { id: "post-5", title: "ページ速度の計測",               note: "PageSpeed Insights でスコア確認" },
      { id: "post-6", title: "アクセス解析の動作確認",         note: "セッションが計測されているか" },
      { id: "post-7", title: "バックアップ体制の確認",         note: "定期バックアップの設定" },
      { id: "post-8", title: "公開告知",                       note: "SNS・メルマガ・関係者への連絡" },
    ],
  };

  const STORAGE_KEY = "wlc-v1";

  function loadState() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch { return {}; }
  }

  function saveState(state) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }

  function render() {
    const state = loadState();

    ["pre", "post"].forEach(phase => {
      const ul = document.getElementById(`list-${phase}`);
      ul.innerHTML = "";

      ITEMS[phase].forEach(item => {
        const checked = !!state[item.id];
        const li = document.createElement("li");
        if (checked) li.classList.add("checked");

        li.innerHTML = `
          <input type="checkbox" id="${item.id}" ${checked ? "checked" : ""}>
          <label class="item-text" for="${item.id}">
            <div class="title">${item.title}</div>
            <div class="note">${item.note}</div>
          </label>
        `;

        li.addEventListener("click", e => {
          if (e.target.tagName === "A") return;
          const cb = li.querySelector("input[type=checkbox]");
          const newVal = e.target === cb ? cb.checked : !cb.checked;
          if (e.target !== cb) cb.checked = newVal;
          const s = loadState();
          s[item.id] = newVal;
          saveState(s);
          render();
        });

        ul.appendChild(li);
      });

      updateCount(phase, state);
    });

    updateTotal(state);
  }

  function updateCount(phase, state) {
    const items = ITEMS[phase];
    const done = items.filter(i => state[i.id]).length;
    const total = items.length;
    const pct = total ? Math.round(done / total * 100) : 0;

    document.getElementById(`count-${phase}`).textContent = `${done} / ${total}`;
    document.getElementById(`rate-${phase}`).textContent = `${pct}%`;
    document.getElementById(`bar-${phase}`).style.width = `${pct}%`;
  }

  function updateTotal(state) {
    const all = [...ITEMS.pre, ...ITEMS.post];
    const done = all.filter(i => state[i.id]).length;
    const pct = Math.round(done / all.length * 100);
    document.getElementById("rate-total").textContent = `${pct}%`;
    document.getElementById("bar-total").style.width = `${pct}%`;
  }

  document.getElementById("reset-btn").addEventListener("click", () => {
    if (confirm("すべてのチェックをリセットしますか？")) {
      localStorage.removeItem(STORAGE_KEY);
      render();
    }
  });

  render();
</script>
</body>
</html>
